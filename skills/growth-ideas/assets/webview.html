<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Ideas</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #f0f0f0;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 6%;
      }
      .card { width: 100%; }
      .header {
        margin-bottom: 18px;
      }
      .product {
        font-size: clamp(18px, 5vw, 26px);
        font-weight: 700;
        color: #fff;
        line-height: 1.3;
      }
      .stage {
        display: inline-block;
        margin-top: 6px;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        background: #1a1a1a;
        color: #888;
        border: 1px solid #333;
      }
      .idea {
        background: #141414;
        border: 1px solid #222;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
        position: relative;
        overflow: hidden;
      }
      .idea::before {
        content: '';
        position: absolute;
        top: 0; left: 0;
        width: 3px; height: 100%;
      }
      .idea:nth-child(1)::before { background: #f97316; }
      .idea:nth-child(2)::before { background: #8b5cf6; }
      .idea:nth-child(3)::before { background: #06b6d4; }
      .idea-num {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .idea:nth-child(1) .idea-num { color: #f97316; }
      .idea:nth-child(2) .idea-num { color: #8b5cf6; }
      .idea:nth-child(3) .idea-num { color: #06b6d4; }
      .idea-title {
        font-size: clamp(15px, 4vw, 19px);
        font-weight: 700;
        color: #fff;
        margin-bottom: 8px;
      }
      .idea-desc {
        font-size: clamp(12px, 3.5vw, 15px);
        color: #999;
        line-height: 1.6;
      }
      .footer { font-size: 11px; color: #333; text-align: right; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">
        <div class="product" id="product"></div>
        <div class="stage" id="stage"></div>
      </div>
      <div id="ideas"></div>
      <div class="footer">made on device with gemma</div>
    </div>
    <script>
      const p = new URLSearchParams(window.location.search);
      document.getElementById('product').textContent = p.get('product') || '';
      document.getElementById('stage').textContent = p.get('stage') || '';

      const ideas = [
        { num: '01', title: p.get('i1t'), desc: p.get('i1d') },
        { num: '02', title: p.get('i2t'), desc: p.get('i2d') },
        { num: '03', title: p.get('i3t'), desc: p.get('i3d') },
      ];
      const container = document.getElementById('ideas');
      ideas.forEach(idea => {
        if (!idea.title) return;
        container.innerHTML += `
          <div class="idea">
            <div class="idea-num">${idea.num}</div>
            <div class="idea-title">${idea.title}</div>
            <div class="idea-desc">${idea.desc}</div>
          </div>`;
      });
    </script>
  </body>
</html>
